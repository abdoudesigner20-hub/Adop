name: Final Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً أيضاً

jobs:
  build:
    runs-on: ubuntu-22.04 # نسخة مستقرة جداً لـ Buildozer

    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            build-essential \
            git \
            python3 \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-gstreamer-lite-dev \
            libgstreamer-plugins-base1.0-dev \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            aidane \
            openjdk-17-jdk

      - name: Install Buildozer
        run: |
          # هذا هو الأمر السحري لتجاوز خطأ "externally-managed-environment"
          python3 -m pip install --user --upgrade buildozer setuptools --break-system-packages
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK with Buildozer
        run: |
          # استخدام 'yes' للموافقة التلقائية على رخص SDK/NDK أثناء البناء
          yes | buildozer android debug
        env:
          # لضمان عدم توقف البناء عند طلب التراخيص
          APP_ANDROID_ACCEPT_SDK_LICENSE: "True"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Optimized-App-APK
          path: bin/*.apk
          
